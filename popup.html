<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Static Page Saver</title>
    <style>
      :root {
        --bg1: #f6f2eb;
        --bg2: #ece6dc;
        --panel: rgba(255, 252, 247, 0.92);
        --line: rgba(120, 105, 85, 0.16);
        --text: #2f2a24;
        --muted: #7b7268;
        --input: rgba(255, 255, 255, 0.74);
        --input-focus: rgba(255, 255, 255, 0.9);
        --primary1: #5d7c6a;
        --primary2: #6e8d79;
        --secondary: rgba(80, 68, 55, 0.06);
        --secondary-hover: rgba(80, 68, 55, 0.1);
        --shadow: 0 16px 40px rgba(58, 46, 34, 0.12);
        --radius: 22px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 368px;
        color: var(--text);
        font:
          13px/1.45 -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Inter,
          Arial,
          sans-serif;
        background:
          radial-gradient(
            120% 120% at 0% 0%,
            rgba(255, 255, 255, 0.72) 0%,
            rgba(255, 255, 255, 0) 45%
          ),
          linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 100%);
        border-radius: var(--radius);
        overflow: hidden;
      }

      .panel {
        padding: 18px;
        border-radius: var(--radius);
        background: var(--panel);
        border: 1px solid var(--line);
        backdrop-filter: blur(16px);
        box-shadow: var(--shadow);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 16px;
      }

      .brand-logo {
        width: 38px;
        height: 38px;
        border-radius: 12px;
        flex: 0 0 auto;
        box-shadow: 0 8px 20px rgba(58, 46, 34, 0.08);
      }

      .brand-copy {
        min-width: 0;
      }

      .title {
        margin: 0;
        font-size: 17px;
        font-weight: 600;
        letter-spacing: 0.1px;
      }

      .sub {
        margin: 2px 0 0;
        color: var(--muted);
        font-size: 12px;
      }

      .label {
        display: block;
        margin: 0 0 7px;
        color: var(--muted);
        font-size: 12px;
      }

      .input {
        width: 100%;
        padding: 12px 13px;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: var(--input);
        color: var(--text);
        outline: none;
        transition:
          background 0.15s ease,
          border-color 0.15s ease,
          box-shadow 0.15s ease;
      }

      .input:focus {
        background: var(--input-focus);
        border-color: rgba(93, 124, 106, 0.32);
        box-shadow: 0 0 0 3px rgba(93, 124, 106, 0.08);
      }

      .row {
        display: flex;
        gap: 10px;
        margin-top: 16px;
      }

      .btn {
        flex: 1;
        border: 0;
        border-radius: 14px;
        padding: 12px;
        font-weight: 600;
        font-size: 13px;
        cursor: pointer;
        transition:
          transform 0.12s ease,
          opacity 0.12s ease,
          background 0.12s ease,
          box-shadow 0.12s ease;
      }

      .btn:hover {
        transform: translateY(-1px);
      }
      .btn:active {
        transform: translateY(0);
      }
      .btn:disabled {
        opacity: 0.6;
        cursor: default;
        transform: none;
      }

      .btn-secondary {
        color: var(--text);
        background: var(--secondary);
        border: 1px solid var(--line);
      }

      .btn-secondary:hover {
        background: var(--secondary-hover);
      }

      .btn-primary {
        color: #fff;
        background: linear-gradient(
          135deg,
          var(--primary1) 0%,
          var(--primary2) 100%
        );
        box-shadow: 0 8px 20px rgba(93, 124, 106, 0.18);
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <div class="brand">
        <img
          class="brand-logo"
          src="icons/icon-source.svg"
          alt="Static Page Saver logo"
        />
        <div class="brand-copy">
          <h1 class="title">Static Page Saver</h1>
          <div class="sub">导出当前页面为单文件 HTML 快照</div>
        </div>
      </div>

      <label class="label" for="filename">文件名</label>
      <input id="filename" class="input" placeholder="例如 article_backup" />

      <div class="row">
        <button id="quickBtn" class="btn btn-secondary">快速下载</button>
        <button id="saveAsBtn" class="btn btn-primary">选择位置下载</button>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
